<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neues Passwort · DMARC Aggregator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() { const t = localStorage.getItem('theme');
      if (t === 'dark' || (t === null && matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark'); })();
  </script>
</head>
<body class="centered">
<form method="post" action="/reset" class="card login">
  <h1>Neues Passwort setzen</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <input type="hidden" name="email" value="{{ email }}">
  <input type="hidden" name="token" value="{{ token }}">
  <label>E-Mail<input type="email" value="{{ email }}" disabled></label>
  <label>Neues Passwort (min. 8)<input type="password" name="new_password" minlength="8" required autofocus></label>
  <button type="submit" class="btn-primary">Speichern</button>
</form>
</body></html>
