<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f7fa; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fa; padding:40px 0;">
  <tr><td align="center">
    <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="background:#ffffff; border-radius:10px; box-shadow:0 1px 2px rgba(15,23,42,.06); overflow:hidden;">
      <tr><td style="padding:24px 28px; border-bottom:1px solid #e3e7ec;">
        {% if brand_logo %}
          <img src="{{ brand_logo }}" alt="{{ brand_name }}" style="max-height:32px; vertical-align:middle;">
        {% else %}
          <strong style="font-size:15px; color:#1f2937;">{{ brand_name }}</strong>
        {% endif %}
      </td></tr>
      <tr><td style="padding:28px 28px 32px 28px; line-height:1.55; font-size:14px;">
        {% block body %}{% endblock %}
      </td></tr>
      <tr><td style="padding:16px 28px; background:#fafbfd; color:#6b7280; font-size:12px;">
        {% block footer %}Diese Mail kommt von deinem DMARC-Aggregator. Antworten gehen ins Leere.{% endblock %}
      </td></tr>
    </table>
  </td></tr>
</table>
</body></html>
