{% extends "email/_base.html" %}
{% block body %}
<h1 style="font-size:18px; margin:0 0 4px 0;">Wöchentliche DMARC-Zusammenfassung</h1>
<p style="color:#6b7280; margin:0 0 16px 0; font-size:13px;">Tenant: <strong>{{ tenant_name }}</strong> · 7 Tage</p>

{% if rows %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
  <thead><tr>
    <th align="left" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; padding:8px 0; border-bottom:1px solid #e3e7ec;">Domain</th>
    <th align="right" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; padding:8px 0; border-bottom:1px solid #e3e7ec;">Nachrichten</th>
    <th align="right" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; padding:8px 0; border-bottom:1px solid #e3e7ec;">Pass-Rate</th>
  </tr></thead>
  <tbody>
  {% for r in rows %}
  <tr>
    <td style="padding:10px 0; border-bottom:1px solid #f1f5f9;">{{ r.domain }}</td>
    <td align="right" style="padding:10px 0; border-bottom:1px solid #f1f5f9;">{{ r.total }}</td>
    <td align="right" style="padding:10px 0; border-bottom:1px solid #f1f5f9; color:{% if r.pass_rate >= 99 %}#16a34a{% elif r.pass_rate < 90 %}#dc2626{% else %}#1f2937{% endif %};">{{ r.pass_rate }} %</td>
  </tr>
  {% endfor %}
  </tbody>
</table>
{% endif %}

<p style="margin:24px 0 0 0;">
  <a href="{{ dashboard_link }}" style="color:#2563eb; text-decoration:none;">→ Im Dashboard ansehen</a>
</p>
{% endblock %}
