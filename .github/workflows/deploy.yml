name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dmarc-geeks
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, dmarc-prod-01]
    steps:
      - name: Run deploy script
        run: bash /opt/dmarc-geeks/deploy.sh
